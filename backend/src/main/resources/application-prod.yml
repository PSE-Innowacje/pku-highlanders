spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:pku}
    username: ${POSTGRES_USER:pku}
    password: ${POSTGRES_PASSWORD:pku}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://${APP_DOMAIN}/realms/pku
          jwk-set-uri: http://keycloak:8180/realms/pku/protocol/openid-connect/certs

keycloak:
  admin:
    server-url: http://keycloak:8180
    realm: pku
    username: ${KEYCLOAK_ADMIN:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

app:
  cors:
    allowed-origins: https://${APP_DOMAIN:localhost}
