services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: pku
      POSTGRES_PASSWORD: pku
      POSTGRES_DB: pku
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./keycloak/init-db.sql:/docker-entrypoint-initdb.d/init-keycloak-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pku"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: pku
      KC_DB_PASSWORD: pku
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8180
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak/pku-realm.json:/opt/keycloak/data/import/pku-realm.json
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
